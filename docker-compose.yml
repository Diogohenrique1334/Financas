# Orquestração dos dois serviços do projeto Finanças.
#
#   docker compose up --build
#
# Banco: PostgreSQL na nuvem (Neon) — não há container de DB, apenas a
# DATABASE_URL lida do .env na raiz.

services:
  backend:
    build: ./backend
    image: financas-backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      ALLOWED_ORIGINS: "http://localhost:8502"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: financas-frontend
    ports:
      # host 8502 → container 8501 (8501 costuma estar ocupado por outro stack local)
      - "8502:8501"
    environment:
      BACKEND_URL: "http://backend:8001"
      BALTAZAR_MAPAS_PATH: "/baltazar_mapas/mapas_dinamicos.py"
    volumes:
      # Monta o módulo de mapas da biblioteca Baltazar (fora do projeto)
      # como read-only — preserva o reuso da lib sem copiá-la para a imagem.
      - ../baltazar/graficos/graficos_streamlit:/baltazar_mapas:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
